name: Render Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Run render tests
        run: bash .github/scripts/render-test.sh
      - name: Run reality-scan tests
        run: bash .github/scripts/reality-scan-test.sh
      - name: Run network-tune tests
        run: bash .github/scripts/network-tune-test.sh
      - name: Run download verify tests
        run: bash .github/scripts/download-verify-test.sh
      - name: Run link tests
        run: bash .github/scripts/link-test.sh
      - name: Run health tests
        run: bash .github/scripts/health-test.sh
      - name: Run firewall tests
        run: bash .github/scripts/firewall-test.sh
      - name: Run source path tests
        run: bash .github/scripts/source-path-test.sh
