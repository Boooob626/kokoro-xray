name: Runtime Assets

on:
  push:
    branches: [testing]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl unzip
      - name: Build runtime asset
        run: KOKORO_ASSET_ARCH=${{ matrix.arch }} bash .github/scripts/build-runtime-assets.sh dist
      - name: Upload runtime asset
        uses: actions/upload-artifact@v4
        with:
          name: kokoro-xray-runtime-linux-${{ matrix.arch }}
          path: |
            dist/kokoro-xray-runtime-linux-${{ matrix.arch }}.tar.gz
            dist/kokoro-xray-runtime-linux-${{ matrix.arch }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download runtime assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish testing runtime release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: testing-runtime
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "testing runtime assets" \
              --notes "Prebuilt kokoro-xray runtime assets for the testing branch. Includes bundled Xray, geoip.dat, and geosite.dat for faster VPS deployment."
          fi
          gh release upload "$TAG" dist/* --clobber
