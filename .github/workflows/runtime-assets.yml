name: Runtime Assets

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl unzip
      - name: Build runtime asset
        run: bash .github/scripts/build-runtime-assets.sh dist
      - name: Upload runtime asset
        uses: actions/upload-artifact@v4
        with:
          name: kokoro-xray-runtime-linux-${{ matrix.arch }}
          path: |
            dist/kokoro-xray-runtime-linux-${{ matrix.arch }}.tar.gz
            dist/kokoro-xray-runtime-linux-${{ matrix.arch }}.tar.gz.sha256
