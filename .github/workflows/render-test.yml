name: Render Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Run tests
        run: |
          bash .github/scripts/render-test.sh
          bash .github/scripts/reality-scan-test.sh
          bash .github/scripts/network-tune-test.sh
          bash .github/scripts/download-verify-test.sh
          bash .github/scripts/link-test.sh
          bash .github/scripts/health-test.sh
          bash .github/scripts/firewall-test.sh
          bash .github/scripts/source-path-test.sh
